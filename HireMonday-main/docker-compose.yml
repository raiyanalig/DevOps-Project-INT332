version: '3.9'

services:
  backend:
    build:
      context: ./Backend
      dockerfile: Dockerfile
    container_name: hiresmart-backend
    ports:
      - "3000:3000"
    env_file:
      - ./Backend/.env

  frontend:
    build:
      context: ./frontend
      args:
        - VITE_API_URL=http://localhost:3000
    container_name: hiresmart-frontend
    ports:
      - "80:80"
    depends_on:
      - backend
